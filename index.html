<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>langd</title>
</head>

<body style="margin:0; font-family:monospace; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="width:520px;">

  <h2>langd</h2>

  <textarea id="input" style="width:100%; height:120px;" placeholder="Speak or type..."></textarea>

  <br><br>

  <label for="langFrom">Source</label>
  <select id="langFrom">
    <option value="auto">Auto</option>
    <option value="en">English</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="es">Spanish</option>
    <option value="it">Italian</option>
    <option value="pt">Portuguese</option>
  </select>

  <label for="langTo">Target</label>
  <select id="langTo">
    <option value="en">English</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="es">Spanish</option>
    <option value="it">Italian</option>
    <option value="pt">Portuguese</option>
  </select>

  <br><br>

  <button onclick="startSTT()">Start Speech</button>
  <button onclick="stopSTT()">Stop</button>
  <button onclick="translateText()">Translate</button>
  <button onclick="speakOutput()">Speak</button>

  <p id="status"></p>
  <h3>Output</h3>
  <div id="output" style="white-space:pre-wrap;"></div>

</div>

<a href="https://github.com/colmlenehan-gh/langd/"
   target="_blank"
   style="position:fixed; bottom:10px; right:10px; font-family:monospace; text-decoration:none; border:1px solid black; padding:6px; background:white;">
  GitHub
</a>

<script>
let recognition;

function setStatus(message) {
  document.getElementById("status").innerText = message || "";
}

function startSTT() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    setStatus("STT not supported in this browser.");
    return;
  }

  if (recognition) {
    try { recognition.stop(); } catch (_) {}
  }

  recognition = new SpeechRecognition();
  const source = document.getElementById("langFrom").value;
  recognition.lang = source === "auto" ? "en-US" : `${source}-US`;
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = function(event) {
    let text = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      text += event.results[i][0].transcript;
    }
    document.getElementById("input").value = text;
  };

  recognition.onerror = function() {
    setStatus("Speech input failed.");
  };

  recognition.onend = function() {
    setStatus("");
  };

  setStatus("Listening...");
  recognition.start();
}

function stopSTT() {
  if (recognition) {
    recognition.stop();
    setStatus("");
  }
}

async function translateText() {
  const text = document.getElementById("input").value.trim();
  const source = document.getElementById("langFrom").value;
  const target = document.getElementById("langTo").value;
  const output = document.getElementById("output");

  if (!text) {
    output.innerText = "Enter text first.";
    return;
  }

  output.innerText = "Translating...";
  setStatus("");

  try {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ q: text, source, target })
    });

    const raw = await res.text();
    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      data = { error: raw };
    }

    const translated = data.translatedText || data.translated;

    if (!res.ok || !translated) {
      output.innerText = `translation failed: ${data.error || "unknown error"}`;
      return;
    }

    output.innerText = translated;
  } catch (err) {
    output.innerText = "translation failed";
    console.error(err);
  }
}

function speakOutput() {
  const text = document.getElementById("output").innerText.trim();
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = document.getElementById("langTo").value;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
